---
- name: Install Docker on Debian host
  hosts: all
  become: true
  become_method: "{{ privilege_escalation_method }}" # value from inventory.yml

  tasks:
    - name: Update apt cache and install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Add Docker's official GPG key and Docker repository to /etc/apt/sources.list.d/
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        architectures: amd64
        uris: https://download.docker.com/linux/debian
        suites: "{{ ansible_distribution_release }}"
        components: stable
        signed_by: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}" # value from inventory.yml
        groups: docker
        append: true
