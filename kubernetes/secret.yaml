apiVersion: v1
kind: Secret
metadata:
  name: appname-secret
  namespace: namespacename
type: Opaque
data:
  appname-username: dGVzdG5hbWU= # testname - values must be BASE64 encoded - use command `echo -n 'testname' | base64`
  appname-password: cGFzczEyMzQ= # pass1234 - values must be BASE64 encoded - use command `echo -n 'pass1234 ' | base64`
---
apiVersion: v1
kind: Secret
metadata:
  name: appname-secret
  namespace: namespacename
type: Opaque
stringData: # stringData allow to provide clear text content, it will be automatically encoded to base64
  root-pass: pass1234
---
apiVersion: v1
kind: Secret
metadata:
  name: appname-secret
  namespace: namespacename
type: Opaque
stringData: # stringData allow to provide clear text content, it will be automatically encoded to base64
  server-cert.pem: |
    -----BEGIN CERTIFICATE-----
    ...your certificate content...
    -----END CERTIFICATE-----
  server-key.pem: |
    -----BEGIN PRIVATE KEY-----
    ...your key content...
    -----END PRIVATE KEY-----
